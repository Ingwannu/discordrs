name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_MIN_LINES: 90.0
jobs:
  rust-check:
    name: rust-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustc --version
          cargo --version

      - name: Cargo check (all features)
        run: cargo check --all-features --locked

      - name: Cargo check (default features)
        run: cargo check --locked

      - name: Cargo check (examples, default features)
        run: cargo check --examples --locked

      - name: Cargo check (examples, all features)
        run: cargo check --examples --all-features --locked

      - name: Cargo test (all features)
        run: cargo test --all-features --locked --no-fail-fast

      - name: Cargo test (default features)
        run: cargo test --locked

      - name: Cargo clippy (all features)
        run: cargo clippy --all-features --all-targets --locked -- -D warnings

      - name: Cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: Cargo clippy (default features)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Cargo fmt (check)
        run: cargo fmt --all -- --check

  coverage:
    name: coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup component add llvm-tools-preview
          rustc --version
          cargo --version

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --locked --lcov --output-path lcov.info --fail-under-lines ${{ env.COVERAGE_MIN_LINES }}

      - name: Upload LCOV artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: lcov.info
