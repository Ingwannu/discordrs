<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>discord.rs Docs</title>
    <meta
      name="description"
      content="Standalone Rust Discord framework docs: gateway runtime, interaction endpoint, components V2 builders, and parsers."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="lang-fab" class="lang-fab">
      <button id="lang-fab-toggle" class="lang-fab-toggle" type="button" aria-haspopup="true" aria-expanded="false">
        <span class="lang-fab-icon">☰</span>
        <span class="lang-fab-label">LANG</span>
      </button>
      <div id="lang-fab-menu" class="lang-fab-menu" hidden>
        <button type="button" data-lang="en">English</button>
        <button type="button" data-lang="ko">한국어</button>
      </div>
    </div>

    <script>
      function appBasePath() {
        var path = window.location.pathname || '/';
        if (!path.endsWith('/')) {
          path = path.replace(/\/[^/]*$/, '/');
        }
        return path;
      }

      function normalizeRoute(route) {
        if (!route || route === '/') return '/README';
        if (route.endsWith('.md')) return route.slice(0, -3);
        if (!route.startsWith('/')) return '/' + route;
        return route;
      }

      function routeToHash(route) {
        return '#' + normalizeRoute(route);
      }

      function navigateToRoute(route) {
        window.location.assign(appBasePath() + routeToHash(route));
      }

      function rewriteHashAnchors() {
        var base = appBasePath();
        document.querySelectorAll('a[href^="/#/"], a[href^="#/"]').forEach(function (a) {
          var href = a.getAttribute('href');
          if (!href) return;
          var hash = href.replace(/^\/?#/, '#');
          a.setAttribute('href', base + hash);
        });
      }

      window.$docsify = {
        name: 'discord.rs docs',
        repo: 'Ingwannu/discord.rs',
        homepage: 'README.md',
        loadSidebar: true,
        loadNavbar: true,
        subMaxLevel: 3,
        auto2top: true,
        relativePath: true,
        maxLevel: 4,
        themeColor: '#4ea1ff',
        alias: {
          '/ko/.*/_sidebar.md': '/ko/_sidebar.md',
          '/ko/_sidebar.md': '/ko/_sidebar.md',
          '/ko/.*/_navbar.md': '/ko/_navbar.md',
          '/ko/_navbar.md': '/ko/_navbar.md',
          '/.*/_sidebar.md': '/_sidebar.md',
          '/.*/_navbar.md': '/_navbar.md'
        },
        search: {
          maxAge: 86400000,
          paths: 'auto',
          placeholder: 'Search docs',
          noData: 'No matching docs found'
        },
        pagination: {
          previousText: 'Previous',
          nextText: 'Next',
          crossChapter: true
        },
        mermaidConfig: {
          theme: 'default',
          flowchart: {
            useMaxWidth: true,
            htmlLabels: true
          }
        },
        plugins: [
          function (hook) {
            hook.doneEach(function () {
              rewriteHashAnchors();
            });
          }
        ]
      };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
    <script>
      (function () {
        var toggle = document.getElementById('lang-fab-toggle');
        var menu = document.getElementById('lang-fab-menu');
        var root = document.getElementById('lang-fab');

        function currentRoute() {
          var hash = window.location.hash || '#/README';
          return normalizeRoute(hash.slice(1));
        }

        function toKo(route) {
          route = normalizeRoute(route);
          if (route.startsWith('/ko/')) return route;
          if (route === '/README') return '/ko/README';
          if (route.startsWith('/docs/guide/')) {
            var guide = route.slice('/docs/guide/'.length);
            if (guide === 'crate-readme' || guide === 'changelog') return route;
            return '/ko/guide/' + guide;
          }
          if (route.startsWith('/docs/api/')) {
            return '/ko/api/' + route.slice('/docs/api/'.length);
          }
          return '/ko/README';
        }

        function toEn(route) {
          route = normalizeRoute(route);
          if (!route.startsWith('/ko/')) return route;
          if (route === '/ko/README') return '/README';
          if (route.startsWith('/ko/guide/')) {
            var guide = route.slice('/ko/guide/'.length);
            if (guide === 'full-manual') return '/docs/guide/full-manual';
            if (guide === 'pdf-manual') return '/docs/guide/pdf-manual';
            return '/docs/guide/' + guide;
          }
          if (route.startsWith('/ko/api/')) {
            return '/docs/api/' + route.slice('/ko/api/'.length);
          }
          return '/README';
        }

        function switchLanguage(lang) {
          var route = currentRoute();
          var target = lang === 'ko' ? toKo(route) : toEn(route);
          navigateToRoute(target);
          menu.hidden = true;
          toggle.setAttribute('aria-expanded', 'false');
        }

        toggle.addEventListener('click', function () {
          var next = menu.hidden;
          menu.hidden = !next;
          toggle.setAttribute('aria-expanded', String(next));
        });

        menu.querySelectorAll('button[data-lang]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            switchLanguage(btn.getAttribute('data-lang'));
          });
        });

        document.addEventListener('click', function (event) {
          if (!root.contains(event.target)) {
            menu.hidden = true;
            toggle.setAttribute('aria-expanded', 'false');
          }
        });

        rewriteHashAnchors();
      })();
    </script>
  </body>
</html>
